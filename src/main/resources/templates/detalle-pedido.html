<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Detalle del Pedido | GourmetRoots</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f4f4;
}

header{
background:#ff5722;
color:white;
padding:20px;
}

nav{

max-width:1200px;
margin:auto;

display:flex;
justify-content:space-between;
align-items:center;

}

.logo{

font-size:30px;
font-weight:bold;
color:white;
text-decoration:none;

}

.menu{

display:flex;
gap:20px;

}

.menu a{

color:white;
text-decoration:none;
font-weight:bold;

}

.contenedor{

width:90%;
max-width:1100px;
margin:40px auto;

}

.card{

background:white;
border-radius:15px;
padding:30px;

box-shadow:0 5px 20px rgba(0,0,0,.15);

}

.encabezado{

display:flex;
justify-content:space-between;
align-items:center;
flex-wrap:wrap;

margin-bottom:25px;

}

.estado{

background:#28a745;
color:white;
padding:8px 18px;
border-radius:25px;
font-weight:bold;

}

table{

width:100%;
border-collapse:collapse;

margin-top:25px;

}

table th{

background:#ff5722;
color:white;

padding:15px;

}

table td{

padding:15px;

border-bottom:1px solid #ddd;

}

.total{

text-align:right;

font-size:28px;

font-weight:bold;

margin-top:30px;

color:#28a745;

}

.boton{

display:inline-block;

margin-top:35px;

padding:12px 22px;

background:#6c757d;

color:white;

text-decoration:none;

border-radius:8px;

font-weight:bold;

}

.boton:hover{

background:#5a6268;

}

</style>

</head>

<body>

<header>

<nav>

<a href="/" class="logo">

🌱 GourmetRoots

</a>

<div class="menu">

<a href="/">Inicio</a>

<a href="/mis-pedidos">

Mis pedidos

</a>

<a href="/logout">

Cerrar sesión

</a>

</div>

</nav>

</header>

<div class="contenedor">

<div class="card">

<div class="encabezado">

<div>

<h2>

Pedido #

<span th:text="${pedido.id}"></span>

</h2>

<br>

<p>

Fecha:

<span th:text="${pedido.fecha}"></span>

</p>

</div>

<div>

<span
class="estado"
th:text="${pedido.estado}">

</span>

</div>

</div>

<table>

<thead>

<tr>

<th>Producto</th>

<th>Cantidad</th>

<th>Precio</th>

<th>Subtotal</th>

</tr>

</thead>

<tbody>

<tr
th:each="detalle : ${pedido.detalles}">

<td
th:text="${detalle.producto.nombre}">

</td>

<td
th:text="${detalle.cantidad}">

</td>

<td>

$

<span
th:text="${#numbers.formatDecimal(detalle.precio,1,2)}">

</span>

</td>

<td>

$

<span
th:text="${#numbers.formatDecimal(detalle.precio * detalle.cantidad,1,2)}">

</span>

</td>

</tr>

</tbody>

</table>

<div class="total">

Total:

$

<span
th:text="${#numbers.formatDecimal(pedido.total,1,2)}">

</span>

</div>

<a
href="/mis-pedidos"
class="boton">

⬅ Volver

</a>

</div>

</div>

</body>

</html>
