<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetRoots | Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">

    <style>
        :root {
            --bg: #faf5ec;
            --top-strip: #1b2b23;
            --text-dark: #22261f;
            --text-muted: #6b6b63;
            --accent: #e8622c;
            --accent-dark: #d1531f;
            --card-bg: #ffffff;
            --editar-bg: #e3edff;
            --editar-fg: #0d6efd;
            --eliminar-bg: #fde3e3;
            --eliminar-fg: #dc3545;
            --font-serif: Georgia, 'Times New Roman', Times, serif;
            --font-sans: Arial, Helvetica, sans-serif;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: var(--font-sans);
        }

        body {
            background: var(--bg);
            color: var(--text-dark);
        }

        /*======================
              FRANJA SUPERIOR
        =======================*/
        .top-strip {
            width: 100%;
            height: 8px;
            background: var(--top-strip);
        }

        /*======================
                HEADER
        =======================*/
        header {
            background: #faf5ec;
            color: var(--text-dark);
            padding: 35px 8%;
            text-align: center;
            border-bottom: 1px solid rgba(0, 0, 0, 0.08);
        }

        header h1 {
            font-family: var(--font-serif);
            font-size: 32px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 15px;
            color: var(--text-muted);
        }

        /*======================
              CONTENEDOR
        =======================*/
        .contenedor {
            width: 90%;
            max-width: 1200px;
            margin: 35px auto;
        }

        /*======================
            BOTÓN VOLVER
        =======================*/
        .boton {
            display: inline-block;
            background: var(--text-dark);
            color: white;
            text-decoration: none;
            padding: 12px 22px;
            border-radius: 999px;
            margin-bottom: 25px;
            font-weight: bold;
            transition: .25s ease;
        }

        .boton:hover {
            background: #10120e;
            transform: translateY(-2px);
        }

        /*======================
          ALERTAS / MENSAJES
        =======================*/
        .alerta-exito {
            background: #d1e7dd;
            color: #0f5132;
            padding: 15px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #0f5132;
            font-weight: 500;
        }

        .alerta-error {
            background: #f8d7da;
            color: #842029;
            padding: 15px 18px;
            border-radius: 12px;
            margin-bottom: 20px;
            border-left: 5px solid #842029;
            font-weight: 500;
        }

        /*======================
          TABLA PROFESIONAL
        =======================*/
        .tabla-contenedor {
            background: var(--card-bg);
            border-radius: 18px;
            overflow: hidden;
            box-shadow: 0 6px 20px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: var(--top-strip);
            color: white;
            padding: 16px 20px;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.6px;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #f0ece2;
            font-size: 15px;
            color: #4a5568;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #faf7f0;
        }

        /* Badges de Roles */
        .badge {
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .admin {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .usuario {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        /*======================
               ACCIONES
        =======================*/
        .acciones {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .editar, .eliminar {
            display: inline-block;
            text-decoration: none;
            padding: 9px 18px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: .25s ease;
        }

        .editar {
            background: var(--editar-bg);
            color: var(--editar-fg);
        }

        .editar:hover {
            background: var(--editar-fg);
            color: white;
        }

        .eliminar {
            background: var(--eliminar-bg);
            color: var(--eliminar-fg);
        }

        .eliminar:hover {
            background: var(--eliminar-fg);
            color: white;
        }

        /*==================================
          MÓVIL / RESPONSIVE (TELÉFONOS)
        ===================================*/
        @media(max-width: 768px) {
            header h1 { font-size: 26px; }
            
            .tabla-contenedor {
                background: transparent;
                box-shadow: none;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead tr, tr:first-child {
                display: none;
            }

            tr {
                background: white;
                border-radius: 14px;
                padding: 15px;
                margin-bottom: 15px;
                box-shadow: 0 4px 14px rgba(0,0,0,0.08);
            }

            td {
                text-align: right;
                padding-left: 45%;
                position: relative;
                border-bottom: 1px dashed #f0ece2;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            td:last-child {
                border-bottom: none;
                padding-bottom: 8px;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                width: 40%;
                text-align: left;
                font-weight: bold;
                color: var(--text-dark);
            }

            .acciones {
                display: flex;
                gap: 10px;
                width: 100%;
                justify-content: flex-end;
                margin-top: 5px;
            }
            
            .editar, .eliminar {
                flex: 1;
                max-width: 120px;
                padding: 10px;
            }
        }
         .navbar{
            width:100%; background:rgba(251,247,239,.92); backdrop-filter:blur(8px);
            color:var(--ink); display:flex; justify-content:space-between; align-items:center;
            padding:16px 6%; position:sticky; top:0; z-index:999;
            border-bottom:1px solid var(--line);
        }
        .logo{ font-family:'Fraunces', serif; font-size:26px; font-weight:600; display:flex; align-items:center; gap:8px; letter-spacing:-.02em; }
        .logo span{ color:var(--brand); }
        .menu{ display:flex; gap:30px; align-items:center; }
        .menu a{
            text-decoration:none; color:var(--ink-soft); font-weight:500; font-size:15px;
            position:relative; transition:color .25s;
        }
        .menu a::after{
            content:''; position:absolute; left:0; bottom:-6px; width:0; height:2px;
            background:var(--brand); transition:width .25s;
        }
        .menu a:hover{ color:var(--ink); }
        .menu a:hover::after{ width:100%; }
        .menu a.cta-link{
            background:var(--ink); color:var(--white) !important; padding:10px 20px; border-radius:30px;
        }
        .menu a.cta-link::after{ display:none; }
        .menu a.cta-link:hover{ background:var(--brand-dark); }
        .menu-toggle{ display:none; background:none; border:none; color:var(--ink); font-size:26px; cursor:pointer; }

    </style>
</head>

<body>

    <div class="top-strip"></div>

    <header>
        <h1>👥 Usuarios Registrados</h1>
        <p>Administración de usuarios de GourmetRoots</p>
    </header>

    <div class="contenedor">

        <a href="/panel" class="boton">
            ← Volver al Panel
        </a>

        <div th:if="${mensaje}" class="alerta-exito">
            <span th:text="${mensaje}"></span>
        </div>

        <div th:if="${error}" class="alerta-error">
            <span th:text="${error}"></span>
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td data-label="ID" th:text="${u.id}"></td>
                        <td data-label="Nombre" th:text="${u.nombre}"></td>
                        <td data-label="Correo" th:text="${u.correo}"></td>
                        <td data-label="Rol">
                            <span th:text="${u.rol.nombre}" 
                                  th:class="${u.rol.nombre=='ADMIN'} ? 'badge admin' : 'badge usuario'">
                            </span>
                        </td>
                        <td data-label="Acciones">
                            <div class="acciones">
                                <a th:href="@{/usuarios/editar/{id}(id=${u.id})}" class="editar">
                                    Editar
                                </a>
                                <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}" class="eliminar"
                                   onclick="return confirm('¿Deseas eliminar este usuario?');">
                                    Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
