<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetRoots | Usuarios</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body {
            background: #f4f4f4;
            color: #333;
        }

        /*======================
                HEADER
        =======================*/
        header {
            background: #ff5722;
            color: white;
            padding: 30px 8%;
            text-align: center;
            box-shadow: 0 4px 10px rgba(0, 0, 0, .15);
        }

        header h1 {
            font-size: 32px;
            margin-bottom: 8px;
        }

        header p {
            font-size: 16px;
            opacity: 0.9;
        }

        /*======================
              CONTENEDOR
        =======================*/
        .contenedor {
            width: 90%;
            max-width: 1200px;
            margin: 35px auto;
        }

        /*======================
            BOTÓN VOLVER
        =======================*/
        .boton {
            display: inline-block;
            background: #6c757d;
            color: white;
            text-decoration: none;
            padding: 12px 20px;
            border-radius: 8px;
            margin-bottom: 25px;
            font-weight: bold;
            transition: .3s ease;
        }

        .boton:hover {
            background: #5a6268;
            transform: translateY(-2px);
        }

        /*======================
          ALERTAS / MENSAJES
        =======================*/
        .alerta-exito {
            background: #d1e7dd;
            color: #0f5132;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #0f5132;
            font-weight: 500;
        }

        .alerta-error {
            background: #f8d7da;
            color: #842029;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
            border-left: 5px solid #842029;
            font-weight: 500;
        }

        /*======================
          TABLA PROFESIONAL
        =======================*/
        .tabla-contenedor {
            background: white;
            border-radius: 15px;
            overflow: hidden;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.08);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            text-align: left;
        }

        th {
            background-color: #222;
            color: white;
            padding: 15px 20px;
            font-size: 15px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 15px 20px;
            border-bottom: 1px solid #edf2f7;
            font-size: 15px;
            color: #4a5568;
            vertical-align: middle;
        }

        tr:last-child td {
            border-bottom: none;
        }

        tr:hover {
            background-color: #f8f9fa;
        }

        /* Badges de Roles */
        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            text-transform: uppercase;
        }

        .admin {
            background-color: #fff3cd;
            color: #856404;
            border: 1px solid #ffeeba;
        }

        .usuario {
            background-color: #e2e8f0;
            color: #4a5568;
        }

        /*======================
               ACCIONES
        =======================*/
        .acciones {
            display: flex;
            gap: 10px;
            align-items: center;
        }

        .editar, .eliminar {
            display: inline-block;
            text-decoration: none;
            padding: 8px 16px;
            border-radius: 6px;
            font-size: 14px;
            font-weight: 600;
            text-align: center;
            transition: .2s ease;
        }

        .editar {
            background: #0d6efd;
            color: white;
        }

        .editar:hover {
            background: #0b5ed7;
        }

        .eliminar {
            background: #dc3545;
            color: white;
        }

        .eliminar:hover {
            background: #bb2d3b;
        }

        /*==================================
          MÓVIL / RESPONSIVE (TELÉFONOS)
        ===================================*/
        @media(max-width: 768px) {
            header h1 { font-size: 26px; }
            
            .tabla-contenedor {
                background: transparent;
                box-shadow: none;
            }

            table, thead, tbody, th, td, tr {
                display: block;
            }

            thead tr, tr:first-child {
                display: none;
            }

            tr {
                background: white;
                border-radius: 12px;
                padding: 15px;
                margin-bottom: 15px;
                box-shadow: 0 3px 10px rgba(0,0,0,0.08);
                border: 1px solid #e2e8f0;
            }

            td {
                text-align: right;
                padding-left: 45%;
                position: relative;
                border-bottom: 1px dashed #edf2f7;
                padding-top: 12px;
                padding-bottom: 12px;
            }

            td:last-child {
                border-bottom: none;
                padding-bottom: 8px;
            }

            td::before {
                content: attr(data-label);
                position: absolute;
                left: 15px;
                width: 40%;
                text-align: left;
                font-weight: bold;
                color: #222;
            }

            .acciones {
                display: flex;
                gap: 10px;
                width: 100%;
                justify-content: flex-end;
                margin-top: 5px;
            }
            
            .editar, .eliminar {
                flex: 1;
                max-width: 120px;
                padding: 10px;
            }
        }
    </style>
</head>

<body>

    <header>
        <h1>👥 Usuarios Registrados</h1>
        <p>Administración de usuarios de FoodHub</p>
    </header>

    <div class="contenedor">

        <a href="/panel" class="boton">
            ← Volver al Panel
        </a>

        <div th:if="${mensaje}" class="alerta-exito">
            <span th:text="${mensaje}"></span>
        </div>

        <div th:if="${error}" class="alerta-error">
            <span th:text="${error}"></span>
        </div>

        <div class="tabla-contenedor">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>Nombre</th>
                        <th>Correo</th>
                        <th>Rol</th>
                        <th>Acciones</th>
                    </tr>
                </thead>
                <tbody>
                    <tr th:each="u : ${usuarios}">
                        <td data-label="ID" th:text="${u.id}"></td>
                        <td data-label="Nombre" th:text="${u.nombre}"></td>
                        <td data-label="Correo" th:text="${u.correo}"></td>
                        <td data-label="Rol">
                            <span th:text="${u.rol.nombre}" 
                                  th:class="${u.rol.nombre=='ADMIN'} ? 'badge admin' : 'badge usuario'">
                            </span>
                        </td>
                        <td data-label="Acciones">
                            <div class="acciones">
                                <a th:href="@{/usuarios/editar/{id}(id=${u.id})}" class="editar">
                                    Editar
                                </a>
                                <a th:href="@{/usuarios/eliminar/{id}(id=${u.id})}" class="eliminar"
                                   onclick="return confirm('¿Deseas eliminar este usuario?');">
                                    Eliminar
                                </a>
                            </div>
                        </td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

</body>
</html>
