<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetRoots | Iniciar Sesión</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
    <link rel="stylesheet" th:href="@{/css/responsive.css}">

    <style>
        :root {
            --bg: #faf5ec;
            --navbar-bg: #faf5ec;
            --top-strip: #1b2b23;
            --text-dark: #22261f;
            --text-muted: #6b6b63;
            --accent: #e8622c;
            --accent-dark: #d1531f;
            --card-bg: #ffffff;
            --font-serif: Georgia, 'Times New Roman', Times, serif;
            --font-sans: Arial, Helvetica, sans-serif;
        }

        body {
            background: var(--bg);
            margin: 0;
            font-family: var(--font-sans);
            color: var(--text-dark);
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /*================ FRANJA SUPERIOR ================*/
        .top-strip {
            width: 100%;
            height: 8px;
            background: var(--top-strip);
        }

        /*================ ESTILOS DEL NAVBAR RESTAURADOS ================*/
        .navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 8%;
            background-color: var(--navbar-bg);
            border-bottom: 1px solid #e1dbcf;
        }
        .logo {
            display: flex;
            align-items: center;
            gap: 10px;
            text-decoration: none;
            color: var(--text-dark);
            font-family: var(--font-serif);
            font-size: 24px;
            font-weight: 700;
        }
        .menu {
            display: flex;
            list-style: none;
            gap: 30px;
            margin: 0;
            padding: 0;
            align-items: center;
        }
        .menu a {
            text-decoration: none;
            color: var(--text-dark);
            font-weight: 600;
            font-size: 15px;
            transition: color 0.25s ease;
        }
        .menu a:hover {
            color: var(--accent);
        }
        .menu-toggle {
            display: none;
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--text-dark);
            padding: 5px;
        }

        /*================ CONTENEDOR CENTRAL LOGIN =================*/
        .login-container {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 60px 20px;
        }

        .login-card {
            background-color: var(--card-bg);
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0, 0, 0, .06);
            width: 100%;
            max-width: 450px;
            border: 1px solid #e1dbcf;
        }

        .login-header {
            text-align: center;
            margin-bottom: 30px;
        }
        .etiqueta {
            display: block;
            color: var(--accent);
            font-weight: 700;
            font-size: 12px;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            margin-bottom: 8px;
        }
        .login-header h2 {
            font-family: var(--font-serif);
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
        }

        /*================ FORMULARIO ELEGANTE =================*/
        .form-group {
            margin-bottom: 22px;
        }
        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            margin-bottom: 8px;
            color: var(--text-dark);
        }
        .input-field {
            width: 100%;
            padding: 14px;
            border: 2px solid #e1dbcf;
            border-radius: 12px;
            box-sizing: border-box;
            font-size: 15px;
            color: var(--text-dark);
            background-color: var(--bg);
            transition: border-color 0.25s ease, background-color 0.25s ease;
        }
        .input-field:focus {
            border-color: var(--accent);
            background-color: #ffffff;
            outline: none;
        }

        .btn-ingresar {
            background-color: var(--accent);
            color: white;
            padding: 14px;
            border-radius: 999px;
            font-size: 15px;
            font-weight: 600;
            width: 100%;
            border: none;
            cursor: pointer;
            transition: 0.25s ease;
            box-shadow: 0 4px 12px rgba(232, 98, 44, .2);
            margin-top: 10px;
        }
        .btn-ingresar:hover {
            background-color: var(--accent-dark);
            transform: translateY(-1px);
        }

        .text-link-container {
            text-align: center;
            margin-top: 20px;
        }
        .text-link {
            color: var(--accent);
            font-size: 14px;
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }
        .text-link:hover {
            color: var(--accent-dark);
            text-decoration: underline;
        }

        /*================ ALERTAS =================*/
        .alert-error {
            background-color: #fef2f2;
            color: #991b1b;
            border: 1px solid #fca5a5;
            padding: 12px 16px;
            border-radius: 10px;
            font-size: 14px;
            margin-top: 20px;
            font-weight: 500;
            text-align: center;
        }

        /*================ FOOTER =================*/
        .gr-footer {
            background: #1b2b23;
            color: white;
            padding: 60px 8%;
            font-family: Arial, Helvetica, sans-serif;
        }
        .gr-footer-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 35px;
            max-width: 1300px;
            margin: 0 auto;
        }
        .gr-footer-grid h3 {
            margin: 0 0 18px 0;
            font-family: Georgia, 'Times New Roman', Times, serif;
            font-size: 19px;
            color: white;
        }
        .gr-footer-grid p {
            color: #cfcfc7;
            font-size: 14.5px;
            line-height: 1.6;
            margin: 0;
        }
        .gr-footer-grid a {
            display: block;
            color: #dcdcd5;
            text-decoration: none;
            margin: 10px 0;
            font-size: 14.5px;
            transition: .25s;
        }
        .gr-footer-grid a:hover {
            color: #e8622c;
        }
        .gr-footer-copy {
            text-align: center;
            margin-top: 40px;
            border-top: 1px solid rgba(255, 255, 255, 0.15);
            padding-top: 20px;
            color: #b7b7ae;
            font-size: 14px;
        }

        @media(max-width:768px) {
            .menu-toggle { display: block; }
            .menu { display: none; }
            .login-card { padding: 30px 20px; }
        }
    </style>
</head>

<body>

    <div class="top-strip"></div>

    <div th:replace="~{nav :: barra-navegacion}"></div>

    <div class="login-container">
        <div class="login-card">
            
            <div class="login-header">
                <span class="etiqueta">Acceso Clientes</span>
                <h2>Iniciar Sesión</h2>
            </div>

            <form th:action="@{/login}" method="post">
                <div class="form-group">
                    <label class="form-label">Correo Electrónico</label>
                    <input type="email" name="correo" class="input-field" placeholder="ejemplo@correo.com" required>
                </div>

                <div class="form-group">
                    <label class="form-label">Contraseña</label>
                    <input type="password" name="password" class="input-field" placeholder="••••••••" required>
                </div>

                <button type="submit" class="btn-ingresar">Ingresar</button>

                <div class="text-link-container">
                    <a href="/recuperar" class="text-link">¿Olvidaste tu contraseña?</a>
                </div>
            </form>

            <div th:if="${error}" class="alert-error">
                <span th:text="${error}">Credenciales incorrectas</span>
            </div>

        </div>
    </div>

    <footer class="gr-footer">
        <div class="gr-footer-grid">
            <div>
                <h3>GourmetRoots</h3>
                <p>La mejor plataforma para descubrir restaurantes y ordenar comida.</p>
            </div>
            <div>
                <h3>Enlaces</h3>
                <a href="/">Inicio</a>
                <a href="/restaurantes">Restaurantes</a>
                <a href="/acerca">Acerca de</a>
                <a href="/contacto">Contacto</a>
            </div>
        </div>
        <div class="gr-footer-copy">
            © 2026 GourmetRoots | Todos los derechos reservados.
        </div>
    </footer>

</body>
</html>
