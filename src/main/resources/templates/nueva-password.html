<!DOCTYPE html>
<html lang="es"
xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>Nueva contraseña | FoodHub</title>

<link
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">

</head>

<body class="bg-light">

<div class="container mt-5">

<div class="row justify-content-center">

<div class="col-md-5">

<div class="card shadow">

<div class="card-header bg-primary text-white text-center">

<h3>

🔒 Nueva contraseña

</h3>

</div>

<div class="card-body">

<form
action="/guardar-password"
method="post">

<input
type="hidden"
name="correo"
th:value="${correo}">

<div class="mb-3">

<label>

Nueva contraseña

</label>

<input
type="password"
name="password"
class="form-control"
required>

</div>

<div class="mb-3">

<label>

Confirmar contraseña

</label>

<input
type="password"
name="confirmar"
class="form-control"
required>

</div>

<button
type="submit"
class="btn btn-primary w-100">

Guardar contraseña

</button>

</form>

<div
th:if="${error}"
class="alert alert-danger mt-3">

<span th:text="${error}"></span>

</div>

</div>

</div>

</div>

</div>

</div>

</body>

</html>
