<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GourmetRoots - Restaurantes</title>
    

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background:#f4f4f4;
        }

        .header{
            background:#ff5722;
            color:white;
            padding:20px;
            text-align:center;
        }

        .contenedor{
            width:90%;
            max-width:1200px;
            margin:auto;
            margin-top:30px;
        }

        .boton{
            display:inline-block;
            background:#28a745;
            color:white;
            padding:12px 20px;
            text-decoration:none;
            border-radius:8px;
            margin-bottom:20px;
            transition:.3s;
        }

        .boton:hover{
            background:#218838;
        }

        .grid{
            display:grid;
            grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
            gap:20px;
        }

        .card{
            background:white;
            border-radius:15px;
            overflow:hidden;
            box-shadow:0 2px 10px rgba(0,0,0,.15);
        }

        .card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .card-body{
            padding:15px;
        }

        .card h3{
            margin-bottom:10px;
        }

        .detalle{
            text-decoration:none;
            color:#333;
        }

        .acciones{
            margin-top:15px;
            display:flex;
            gap:10px;
        }

        .eliminar{
            display:inline-block;
            background:#dc3545;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:6px;
            transition:.3s;
        }

        .eliminar:hover{
            background:#bb2d3b;
        }

        .editar{
            display:inline-block;
            background:#0d6efd;
            color:white;
            padding:8px 15px;
            text-decoration:none;
            border-radius:6px;
            transition:.3s;
        }

        .editar:hover{
            background:#0b5ed7;
        }

    </style>

</head>
<body>

<div class="header">

    <div style="
    display:flex;
    justify-content:space-between;
    align-items:center;
    flex-wrap:wrap;
    max-width:1200px;
    margin:auto;">

        <div>

            <h1>🌱 GourmetRoots</h1>

            <p>Encuentra los mejores restaurantes</p>

        </div>

        <div style="
        display:flex;
        gap:18px;
        align-items:center;">

           

            <th:block th:if="${usuario==null}">

                <a href="/login"
                   style="color:white;text-decoration:none;font-weight:bold;">

                    Iniciar sesión

                </a>

                <a href="/registro"
                   style="color:white;text-decoration:none;font-weight:bold;">

                    Registrarse

                </a>

            </th:block>

            <th:block th:if="${usuario!=null}">

                <a href="/carrito"
                   style="color:white;text-decoration:none;font-weight:bold;">

                    🛒 Mi carrito

                </a>

                <a href="/panel"
                      style="color:white;text-decoration:none;font-weight:bold;">
                      Panel
                </a>

                <a href="/logout"
                   style="color:white;text-decoration:none;font-weight:bold;">

                    Cerrar sesión

                </a>
                

            </th:block>

        </div>

    </div>

</div>
<div class="contenedor">

   <th:block
th:if="${usuario != null and usuario.rol.nombre == 'ADMIN'}">

    <a href="/restaurantes/nuevo"
       class="boton">

        ➕ Agregar Restaurante

    </a>

</th:block>

    <div class="grid">

        <div class="card" th:each="r : ${restaurantes}">

            <img th:src="${r.imagen}" alt="Imagen">

            <div class="card-body">

                <a class="detalle"
                   th:href="@{/restaurantes/{id}(id=${r.id})}">
                    <h3 th:text="${r.nombre}"></h3>
                </a>

                <p th:text="${r.descripcion}"></p>

                <div class="acciones">

                    <a class="editar"
                       th:href="@{/restaurantes/editar/{id}(id=${r.id})}">
                        ✏️ Editar
                    </a>

                    <a class="eliminar"
                       th:href="@{/restaurantes/eliminar/{id}(id=${r.id})}">
                        🗑️ Eliminar
                    </a>

                </div>

            </div>

        </div>

    </div>

</div>

</body>
</html>
