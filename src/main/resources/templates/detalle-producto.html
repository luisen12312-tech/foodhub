<!DOCTYPE html>
<html lang="es" xmlns:th="http://www.thymeleaf.org">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Detalle del Producto</title>


<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f4f4f4;
}

.header{

    background:#ff5722;
    color:white;
    text-align:center;
    padding:25px;

}

.contenedor{

    width:90%;
    max-width:900px;
    margin:40px auto;

}

.card{

    background:white;

    border-radius:15px;

    overflow:hidden;

    box-shadow:0 5px 15px rgba(0,0,0,.15);

}

.card img{

    width:100%;
    height:350px;
    object-fit:cover;

}

.info{

    padding:30px;

}

.info h2{

    color:#333;
    margin-bottom:20px;

}

.info p{

    margin-bottom:15px;
    line-height:1.6;
    color:#555;

}

.precio{

    font-size:24px;
    color:#28a745;
    font-weight:bold;

}

.restaurante{

    color:#ff5722;
    font-weight:bold;

}

.boton{

    display:inline-block;

    margin-top:25px;

    background:#ff5722;

    color:white;

    text-decoration:none;

    padding:12px 22px;

    border-radius:8px;

    transition:.3s;

}

.boton:hover{

    background:#e64a19;

}

</style>

</head>

<body>

<div class="header">

<h1>🌱 GourmetRoots</h1>

<p>Información del Producto</p>

</div>

<div class="contenedor">

<div class="card">

<img
th:src="${producto.imagen}"
alt="Imagen del producto">

<div class="info">

<h2 th:text="${producto.nombre}"></h2>

<p>

<strong>Descripción:</strong>

<span th:text="${producto.descripcion}"></span>

</p>

<p class="precio">

$
<span th:text="${producto.precio}"></span>

</p>

<p>

<strong>Restaurante:</strong>

<span
class="restaurante"
th:text="${producto.restaurante.nombre}">
</span>

</p>

<a
href="/productos"
class="boton">

← Regresar

</a>

</div>

</div>

</div>

</body>
</html>
